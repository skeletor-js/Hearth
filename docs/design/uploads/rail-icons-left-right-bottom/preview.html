<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Rail Icons Preview</title>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #252625; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
  .bar { display: flex; gap: 24px; padding: 18px 22px; border-radius: 12px; background: #2b2c2b; color: #9AA1A6; box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
  .btn { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; }
  .btn:hover { background: rgba(255,255,255,.06); color: #B8C0C4; }
  svg { width: 18px; height: 18px; }
</style>
</head>
<body>
  <div class="bar">
    <div class="btn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none" color="#9AA1A6" role="img" aria-label="Left rail">
  <rect x="3.25" y="4.25" width="11.5" height="9.5" rx="2.1" stroke="currentColor" stroke-width="1.35" vector-effect="non-scaling-stroke"/>
  <path d="M6.55 6.45V11.55" stroke="currentColor" stroke-width="2" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
</svg>
</div>
    <div class="btn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none" color="#9AA1A6" role="img" aria-label="Bottom rail">
  <rect x="3.25" y="4.25" width="11.5" height="9.5" rx="2.1" stroke="currentColor" stroke-width="1.35" vector-effect="non-scaling-stroke"/>
  <path d="M6.25 11.35H11.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
</svg>
</div>
    <div class="btn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none" color="#9AA1A6" role="img" aria-label="Right rail">
  <rect x="3.25" y="4.25" width="11.5" height="9.5" rx="2.1" stroke="currentColor" stroke-width="1.35" vector-effect="non-scaling-stroke"/>
  <path d="M11.45 6.45V11.55" stroke="currentColor" stroke-width="2" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
</svg>
</div>
  </div>
</body>
</html>
